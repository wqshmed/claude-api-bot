name: Build

on:
  pull_request:
    branches:
      - main

jobs:
  pipeline:
    uses: wqshmed/common_workflows/.github/workflows/main.yml@main
    with:
      java_version: '21'
      image_name: 'wqshmed/claude-api-bot'
      project_key: 'claude-api-bot'
      organization: 'wqshmed-sonar'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}