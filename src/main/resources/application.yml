# Base configuration shared by every profile.
# Profile-specific overrides live in application-{profile}.yml.
# Activate a profile with: --spring.profiles.active=dev  (or SPRING_PROFILES_ACTIVE env var)
spring:
  application:
    name: claude-api-bot
  profiles:
    # Default profile when none is supplied. Override via SPRING_PROFILES_ACTIVE.
    default: local

server:
  port: 8080

anthropic:
  # The SDK reads ANTHROPIC_API_KEY from the environment; this binds it for @Value.
  api-key: ${ANTHROPIC_API_KEY}
  # Claude model. Profiles below pick cheaper/faster vs. most-capable models.
  model: claude-opus-4-8
  # Upper bound on generated tokens (includes adaptive thinking tokens).
  max-tokens: 500

# Personal-assistant context injected into the system prompt. Edit the JSON to
# add details about yourself. Point this at a file:/... path to keep it outside
# the build. Read once at startup — restart to pick up edits.
assistant:
  context-file: classpath:assistant-context.json