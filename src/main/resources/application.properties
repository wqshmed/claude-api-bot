spring.application.name=claude-api-bot
server.port=8080

# Claude model. Default is the most capable model; switch to
# claude-haiku-4-5 for cheaper/faster learning experiments.
anthropic.model=claude-opus-4-8

# Upper bound on generated tokens (includes adaptive thinking tokens).
anthropic.max-tokens=8192
anthropic.api-key=${ANTHROPIC_API_KEY}